[package]
title = "MOS App Extension"
version = "0.1.0"
description = "Participant name prompt, ordered USDZ scene list, scoring panel, and score persistence for the MOS evaluation app."
category = "Tools"
keywords = ["kit", "extension", "mos", "evaluation", "scoring"]
readme  = "docs/README.md"
repository = "https://github.com/NVIDIA-Omniverse/kit-app-template"

[dependencies]
"omni.kit.uiapp" = {}
"omni.usd" = {}
"omni.kit.commands" = {}
"omni.kit.viewport.utility" = {}

[settings.exts."nycu.mos_app_extension"]
# Disk prefetch + GPU-resident dual-slot standby (see reports/).
preload.enabled = true
preload.mode = "gpu_resident"
preload.lookahead = 1
preload.startDelaySec = 2.0
# Empty string = page-cache warm only (no local copy).
preload.localCacheDir = "/tmp/mos_usdz_cache"
preload.showStatus = false

[[python.module]]
name = "nycu.mos_app_extension"

[documentation]
pages = [
    "docs/Overview.md",
]
