[package]
title = "Metric Sliders"
version = "0.1.0"
description = "UI sliders (0-5) to rate the currently loaded asset, with per-file saving."
category = "Tools"
changelog = "docs/CHANGELOG.md"
keywords = ["kit", "extension", "python", "ui", "metrics", "sliders"]
readme  = "docs/README.md"
repository = "https://github.com/NVIDIA-Omniverse/kit-app-template"

[dependencies]
"omni.kit.uiapp" = {}
"omni.usd" = {}

[settings]

